<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PH_MUSIC - Web Player</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="player-container">
    
    <!-- Sidebar -->
    <aside class="playlist-section">
      <!-- Marca PH_MUSIC -->
      <div class="brand">
        <i class="fa-solid fa-compact-disc brand-icon"></i>
        <h2>PH_MUSIC</h2>
      </div>

      <!-- Barra de Busca -->
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="Buscar música ou artista...">
      </div>

      <!-- Filtro de Pastas -->
      <div class="folders-filter">
        <p class="filter-title"><i class="fa-solid fa-folder"></i> Categorias / Pastas</p>
        <div id="folder-buttons" class="folder-buttons-container">
          <!-- Botões gerados via JS -->
        </div>
      </div>

      <!-- Lista de Músicas -->
      <ul id="playlist" class="playlist-list">
        <!-- Lista carregada via JS -->
      </ul>
    </aside>

    <!-- Player Principal -->
    <main class="player-main">
      <div class="now-playing-card">
        <div class="cover-wrapper">
          <img id="track-cover" src="" alt="Capa da Música">
        </div>
        
        <div class="track-details">
          <h1 id="track-title">Carregando biblioteca...</h1>
          <p id="track-artist">PH_MUSIC</p>
        </div>

        <div class="progress-area">
          <span id="current-time">0:00</span>
          <input type="range" id="progress-bar" value="0" min="0" max="100">
          <span id="total-duration">0:00</span>
        </div>

        <div class="controls">
          <button id="btn-prev" class="btn-control"><i class="fa-solid fa-backward-step"></i></button>
          <button id="btn-play" class="btn-control btn-play-main"><i class="fa-solid fa-play" id="play-icon"></i></button>
          <button id="btn-next" class="btn-control"><i class="fa-solid fa-forward-step"></i></button>
        </div>

        <div class="volume-container">
          <i class="fa-solid fa-volume-high"></i>
          <input type="range" id="volume-bar" value="100" min="0" max="100">
        </div>
      </div>
    </main>

  </div>

  <audio id="audio-player"></audio>
  <script src="app.js"></script>
</body>
</html>
